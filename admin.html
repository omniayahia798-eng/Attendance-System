<!-- admin.html (شاشة مدير النظام) -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم مدير النظام</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #eef2f5; margin: 0; padding: 20px; }
        .header { background: #343a40; color: white; padding: 15px; border-radius: 8px; text-align: center; }
        .grid { display: flex; gap: 20px; margin-top: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; flex: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #007bff; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h1>لوحة تحكم مدير النظام (Admin Dashboard)</h1>
    </div>
    <div class="grid">
        <div class="card">
            <h3>إدارة المستخدمين</h3>
            <table>
                <tr><th>المستخدم</th><th>الدور</th><th>الحالة</th></tr>
                <tr><td>أحمد علي</td><td>ليدر دفعة</td><td>نشط</td></tr>
                <tr><td>سارة محمد</td><td>طالب</td><td>نشط</td></tr>
            </table>
        </div>
    </div>
</body>
</html>
